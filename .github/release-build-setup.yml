- name: Install Node.js
  uses: actions/setup-node@v4
  with:
    node-version: 24
    cache: 'yarn'
- name: Install Node dependencies
  run: yarn install
- name: Install Rust toolchain
  uses: actions-rust-lang/setup-rust-toolchain@v1
- name: Build bundled assets
  run: |
    yarn build:preview
    yarn build:l10n
